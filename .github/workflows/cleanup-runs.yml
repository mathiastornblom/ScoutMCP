name: Cleanup Failed Runs

on:
  workflow_run:
    workflows: ["Update Docker MCP Registry"]
    types: [completed]
  schedule:
    - cron: "0 3 * * 1"  # Monday 03:00 UTC

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      actions: write

    steps:
      - name: Delete failed and cancelled runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/actions/runs \
            --paginate \
            --jq '.workflow_runs[] | select(.conclusion == "failure" or .conclusion == "cancelled") | .id' \
          | xargs -r -I{} gh api -X DELETE repos/${{ github.repository }}/actions/runs/{}
